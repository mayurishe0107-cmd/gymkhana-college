<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Campus Gallery</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Poppins,sans-serif;
}

body{
background:#f5f5f5;
padding:40px 20px;
}

.gallery-title{
text-align:center;
font-size:48px;
font-weight:700;
margin-bottom:40px;
color:#111;
}

.gallery-grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:20px;
max-width:1200px;
margin:auto;
}

.gallery-card{
background:white;
border-radius:18px;
overflow:hidden;
height:280px;
box-shadow:0 4px 15px rgba(0,0,0,0.08);
}

.gallery-card img{
width:100%;
height:100%;
object-fit:cover;
display:block;
}

.back-box{
text-align:center;
margin-top:40px;
}

.back-btn{
display:inline-block;
padding:12px 28px;
background:linear-gradient(90deg,#7b5cff,#5b8cff);
color:white;
text-decoration:none;
border-radius:12px;
font-weight:600;
}

@media(max-width:768px){

.gallery-grid{
grid-template-columns:1fr;
}

.gallery-card{
height:240px;
}

.gallery-title{
font-size:34px;
}

}

</style>
</head>

<body>

<h1 class="gallery-title">
Campus Gallery
</h1>

<div class="gallery-grid">

<div class="gallery-card">
<img src="gymkhana-home/gallery1.jpg">
</div>

<div class="gallery-card">
<img src="gymkhana-home/gallery2.jpg">
</div>

<div class="gallery-card">
<img src="gymkhana-home/gallery3.jpg">
</div>

<div class="gallery-card">
<img src="gymkhana-home/gallery4.jpg">
</div>

<div class="gallery-card">
<img src="gymkhana-home/gallery5.jpg">
</div>

<div class="gallery-card">
<img src="gymkhana-home/gallery6.jpg">
</div>

</div>

<div class="back-box">

<a href="home.html" class="back-btn">
Back To Home
</a>

</div>

</body>
</html>
