<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Add Coordinator</title>


<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}


body{

background:#f8fafc;
color:#1e3a8a;

}


/* HEADER */

.page-banner{

background:linear-gradient(135deg,#2563eb,#0ea5e9);
color:white;
text-align:center;
padding:45px 20px;

}


.page-banner h1{

font-size:38px;

}


.page-banner p{

margin-top:10px;

}


/* FORM */

.container{

width:50%;
margin:50px auto;
background:white;
padding:35px;
border-radius:15px;
box-shadow:0 5px 20px rgba(0,0,0,0.1);

}



label{

display:block;
font-weight:bold;
margin-top:15px;

}



input{

width:100%;
padding:12px;
margin-top:8px;
border:1px solid #cbd5e1;
border-radius:8px;
font-size:15px;

}



/* BUTTON */

.add-btn{

margin-top:25px;
width:100%;
padding:14px;
background:#14b8a6;
color:white;
border:none;
border-radius:10px;
font-size:16px;
font-weight:bold;
cursor:pointer;

}



.add-btn:hover{

background:#0f766e;

}



/* FOOTER */

footer{

margin-top:50px;
background:#2563eb;
color:white;
text-align:center;
padding:15px;

}



@media(max-width:800px){

.container{

width:90%;

}

}


</style>

</head>


<body>



<section class="page-banner">

<h1>➕ Add New Coordinator</h1>

<p>
Add Gymkhana and Sports Department Members
</p>

</section>




<div class="container">


<form>



<label>
Position
</label>

<input type="text" 
placeholder="Example: Gymkhana Head">





<label>
Name
</label>

<input type="text"
placeholder="Enter Coordinator Name">





<label>
Contact Number
</label>

<input type="text"
placeholder="Enter Mobile Number">





<label>
Email
</label>

<input type="email"
placeholder="Enter Email ID">





<button class="add-btn">

Add Coordinator

</button>



</form>


</div>




<footer>

© 2026 College Gymkhana Sports Department.

</footer>



</body>

</html>
