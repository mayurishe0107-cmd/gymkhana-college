<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Edit Outdoor Competitions</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}


body{
    background:#f8fafc;
    color:#1e3a8a;
}


/* Banner */

.page-banner{

    background:linear-gradient(135deg,#2563eb,#0ea5e9);
    color:white;
    text-align:center;
    padding:45px 20px;

}


.page-banner h1{
    font-size:40px;
}


.page-banner p{
    margin-top:10px;
}



/* Container */

.container{

    width:70%;
    margin:40px auto;

}



.card{

    background:white;
    padding:30px;
    border-radius:15px;
    box-shadow:0 5px 20px rgba(0,0,0,0.08);

}



.card h2{

    color:#1e3a8a;
    margin-bottom:20px;

}



/* Competition list */

.competition-item{

    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:18px 10px;
    border-bottom:1px solid #e2e8f0;

}


.competition-item span{

    color:#475569;
    font-size:16px;

}



/* Delete button */

.delete-btn{

    background:#dc3545;
    color:white;
    border:none;
    padding:8px 15px;
    border-radius:8px;
    cursor:pointer;

}



/* Add button */

.add-btn{

    margin-top:20px;
    background:#14b8a6;
    color:white;
    border:none;
    padding:12px 20px;
    border-radius:8px;
    cursor:pointer;

}



/* Save button */

.save-btn{

    margin-top:25px;
    background:#2563eb;
    color:white;
    border:none;
    padding:12px 25px;
    border-radius:8px;
    cursor:pointer;

}


/* Footer */

footer{

    margin-top:50px;
    background:#2563eb;
    color:white;
    text-align:center;
    padding:15px;

}
.competition-row{

display:flex;
align-items:center;
gap:20px;
margin:15px 0;

}


.competition-row input{

flex:1;
padding:12px;
border:1px solid #ddd;
border-radius:10px;
font-size:15px;
color:#1e3a8a;

}



.delete-btn{

background:#dc3545;
color:white;
border:none;
padding:10px 18px;
border-radius:8px;
cursor:pointer;

}



.add-btn{

background:#14b8a6;
color:white;
padding:12px 20px;
border:none;
border-radius:8px;
margin-top:20px;
cursor:pointer;

}



.save-btn{

background:#2563eb;
color:white;
padding:12px 25px;
border:none;
border-radius:8px;
margin-top:20px;
cursor:pointer;

}


</style>

</head>


<body>


<section class="page-banner">

<h1>⚽ Edit Outdoor Competitions</h1>

<p>
Add, remove and update outdoor sports names
</p>

</section>



<div class="container">


<div class="card">


<div class="competition-list">

<h2>Competition List</h2>


<div class="competition-row">

<input type="text" value="🏏 Cricket">

<button class="delete-btn" onclick="deleteCompetition(this)">
Delete
</button>

</div>



<div class="competition-row">

<input type="text" value="⚽ Football">

<button class="delete-btn" onclick="deleteCompetition(this)">
Delete
</button>

</div>



<div class="competition-row">

<input type="text" value="🏐 Volleyball">

<button class="delete-btn" onclick="deleteCompetition(this)">
Delete
</button>
</div>



<div class="competition-row">

<input type="text" value="🤼 Kabaddi">

<button class="delete-btn" onclick="deleteCompetition(this)">
Delete
</button>
</div>



<div class="competition-row">

<input type="text" value="🏃 Athletics">

<button class="delete-btn" onclick="deleteCompetition(this)">
Delete
</button>

</div>



<div class="competition-row">

<input type="text" value="🏸 Badminton">

<button class="delete-btn" onclick="deleteCompetition(this)">
Delete
</button>

</div>


</div>



<button class="add-btn" onclick="addCompetition()">
+ Add New Competition
</button>


<button class="save-btn">
Save Changes
</button>
</div>


</div>



<footer>

© 2026 College Gymkhana Sports Department.

</footer>

<script>

function addCompetition(){

    let list = document.querySelector(".competition-list");


    let newRow = document.createElement("div");

    newRow.className = "competition-row";


    newRow.innerHTML = `

    <input type="text" placeholder="Enter new competition name">


    <button class="delete-btn" onclick="deleteCompetition(this)">
    Delete
    </button>

    `;


    list.appendChild(newRow);

}



function deleteCompetition(button){

    button.parentElement.remove();

}


</script>
</body>

</html>
