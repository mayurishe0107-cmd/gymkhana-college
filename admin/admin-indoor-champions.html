<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Admin Indoor Champions</title>


<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}


body{
    background:#f8fafc;
    color:#1e3a8a;
}



/* Banner */

.page-banner{

    background:linear-gradient(135deg,#2563eb,#0ea5e9);
    color:white;
    text-align:center;
    padding:45px 20px;

}


.page-banner h1{

    font-size:40px;

}


.page-banner p{

    margin-top:10px;

}



/* Admin Tag */

.admin-tag{

    text-align:center;
    margin:25px;
    color:#2563eb;
    font-weight:bold;

}



/* Container */

.container{

    width:85%;
    margin:30px auto;

}



/* Champion Card */

.champion-card{

    background:white;
    padding:25px;
    border-radius:15px;
    margin-bottom:25px;
    box-shadow:0 5px 20px rgba(0,0,0,0.08);

}



label{

    display:block;
    font-weight:bold;
    margin-top:12px;

}



input{

    width:100%;
    padding:10px;
    margin-top:5px;
    border:1px solid #cbd5e1;
    border-radius:8px;
    font-size:15px;

}




/* Buttons */

button{

    border:none;
    padding:10px 18px;
    border-radius:8px;
    color:white;
    cursor:pointer;
    font-weight:bold;
    margin-top:15px;

}



.delete{

    background:#ef4444;

}



.add{

    background:#14b8a6;

}



.save{

    background:#2563eb;

}



/* Footer */

footer{

    margin-top:50px;
    background:#2563eb;
    color:white;
    text-align:center;
    padding:15px;

}



</style>


</head>


<body>



<section class="page-banner">

<h1>🏆 Indoor Champions Admin</h1>

<p>
Manage indoor sports winners and achievements
</p>

</section>




<div class="admin-tag">

INDOOR CHAMPIONS ADMIN PANEL

</div>




<div class="container" id="championContainer">



<!-- Chess -->


<div class="champion-card">


<label>Sport Name</label>

<input value="♟ Chess">



<label>Winner</label>

<input value="Team Alpha">



<label>1st Runner-Up</label>

<input value="Team Beta">



<label>2nd Runner-Up</label>

<input value="Team Gamma">



<label>Year</label>

<input value="2025">



<button class="delete" onclick="deleteCard(this)">
Delete Sport
</button>


</div>






<!-- Carrom -->


<div class="champion-card">


<label>Sport Name</label>

<input value="🎯 Carrom">



<label>Winner</label>

<input value="Team Warriors">



<label>1st Runner-Up</label>

<input value="Team Champions">



<label>2nd Runner-Up</label>

<input value="Team Strikers">



<label>Year</label>

<input value="2025">



<button class="delete" onclick="deleteCard(this)">
Delete Sport
</button>


</div>






<!-- Table Tennis -->


<div class="champion-card">


<label>Sport Name</label>

<input value="🏓 Table Tennis">



<label>Winner</label>

<input value="Team Titans">



<label>1st Runner-Up</label>

<input value="Team Smashers">



<label>2nd Runner-Up</label>

<input value="Team Players">



<label>Year</label>

<input value="2025">



<button class="delete" onclick="deleteCard(this)">
Delete Sport
</button>


</div>



</div>






<center>


<button class="add" onclick="addChampion()">

+ Add New Champion Sport

</button>



<button class="save">

Save Changes

</button>



</center>







<footer>

© 2026 College Gymkhana Sports Department.

</footer>





<script>


function deleteCard(button){

    button.parentElement.remove();

}




function addChampion(){


let container=document.getElementById("championContainer");


let card=document.createElement("div");


card.className="champion-card";


card.innerHTML=`

<label>Sport Name</label>
<input placeholder="Enter Sport Name">


<label>Winner</label>
<input placeholder="Enter Winner">


<label>1st Runner-Up</label>
<input placeholder="Enter 1st Runner-Up">


<label>2nd Runner-Up</label>
<input placeholder="Enter 2nd Runner-Up">


<label>Year</label>
<input placeholder="Enter Year">


<button class="delete" onclick="deleteCard(this)">
Delete Sport
</button>


`;


container.appendChild(card);


}



</script>



</body>

</html>
