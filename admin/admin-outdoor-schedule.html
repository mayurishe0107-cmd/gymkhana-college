<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Admin Outdoor Schedule</title>


<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}


body{

background:#f8fafc;
color:#1e3a8a;

}


/* Banner */

.page-banner{

background:linear-gradient(135deg,#2563eb,#0ea5e9);
color:white;
text-align:center;
padding:45px 20px;

}


.page-banner h1{

font-size:40px;

}


.page-banner p{

margin-top:10px;

}



/* Admin tag */

.admin-tag{

text-align:center;
margin:25px;
color:#2563eb;
font-weight:bold;

}



/* Container */

.container{

width:85%;
margin:30px auto;

}



/* Schedule card */

.schedule-card{

background:white;
padding:25px;
border-radius:15px;
margin-bottom:25px;
box-shadow:0 5px 20px rgba(0,0,0,0.08);

}



.schedule-card h2{

margin-bottom:15px;
color:#1e3a8a;

}



label{

font-weight:bold;
display:block;
margin-top:10px;

}



input{

width:100%;
padding:10px;
margin-top:5px;
border:1px solid #ddd;
border-radius:8px;
font-size:15px;

}



/* Buttons */

button{

border:none;
padding:10px 18px;
border-radius:8px;
color:white;
cursor:pointer;
font-weight:bold;
margin-top:15px;

}


.delete{

background:#dc3545;

}


.add{

background:#14b8a6;

}


.save{

background:#2563eb;

}



/* Footer */

footer{

margin-top:50px;
background:#2563eb;
color:white;
text-align:center;
padding:15px;

}


</style>


</head>



<body>



<section class="page-banner">

<h1>📅 Outdoor Schedule Admin</h1>

<p>
Manage outdoor sports tournament schedule
</p>

</section>



<div class="admin-tag">

OUTDOOR SCHEDULE ADMIN PANEL

</div>



<div class="container" id="scheduleContainer">



<!-- Cricket -->

<div class="schedule-card">

<label>Sport Name</label>
<input value="Cricket">


<label>Date</label>
<input value="15 July 2026">


<label>Time</label>
<input value="9:00 AM">


<label>Venue</label>
<input value="College Ground">


<button class="delete" onclick="deleteSchedule(this)">
Delete Schedule
</button>

</div>




<!-- Football -->

<div class="schedule-card">

<label>Sport Name</label>
<input value="Football">


<label>Date</label>
<input value="18 July 2026">


<label>Time</label>
<input value="8:30 AM">


<label>Venue</label>
<input value="Football Ground">


<button class="delete" onclick="deleteSchedule(this)">
Delete Schedule
</button>

</div>





<!-- Volleyball -->

<div class="schedule-card">

<label>Sport Name</label>
<input value="Volleyball">


<label>Date</label>
<input value="20 July 2026">


<label>Time</label>
<input value="10:00 AM">


<label>Venue</label>
<input value="Volleyball Court">


<button class="delete" onclick="deleteSchedule(this)">
Delete Schedule
</button>

</div>





<!-- Kabaddi -->

<div class="schedule-card">

<label>Sport Name</label>
<input value="Kabaddi">


<label>Date</label>
<input value="22 July 2026">


<label>Time</label>
<input value="4:00 PM">


<label>Venue</label>
<input value="Sports Arena">


<button class="delete" onclick="deleteSchedule(this)">
Delete Schedule
</button>

</div>





<!-- Badminton -->

<div class="schedule-card">

<label>Sport Name</label>
<input value="Badminton">


<label>Date</label>
<input value="25 July 2026">


<label>Time</label>
<input value="11:00 AM">


<label>Venue</label>
<input value="Indoor Hall">


<button class="delete" onclick="deleteSchedule(this)">
Delete Schedule
</button>

</div>





<!-- Athletics -->

<div class="schedule-card">

<label>Sport Name</label>
<input value="Athletics">


<label>Date</label>
<input value="28 July 2026">


<label>Time</label>
<input value="7:00 AM">


<label>Venue</label>
<input value="Athletics Track">


<button class="delete" onclick="deleteSchedule(this)">
Delete Schedule
</button>

</div>


</div>




<center>

<button class="add" onclick="addSchedule()">
+ Add New Schedule
</button>


<button class="save">
Save Changes
</button>

</center>



<footer>

© 2026 College Gymkhana Sports Department.

</footer>




<script>


function deleteSchedule(btn){

btn.parentElement.remove();

}



function addSchedule(){


let container=document.getElementById("scheduleContainer");


let card=document.createElement("div");


card.className="schedule-card";


card.innerHTML=`

<label>Sport Name</label>
<input placeholder="Enter Sport Name">


<label>Date</label>
<input placeholder="Enter Date">


<label>Time</label>
<input placeholder="Enter Time">


<label>Venue</label>
<input placeholder="Enter Venue">


<button class="delete" onclick="deleteSchedule(this)">
Delete Schedule
</button>

`;


container.appendChild(card);


}



</script>



</body>

</html>
