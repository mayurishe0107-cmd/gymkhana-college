<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Edit Outdoor Registration</title>


<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}


body{
    background:#f8fafc;
    color:#1e3a8a;
}


/* Banner */

.page-banner{

    background:linear-gradient(135deg,#2563eb,#0ea5e9);
    color:white;
    text-align:center;
    padding:45px 20px;

}


.page-banner h1{

    font-size:38px;

}


.page-banner p{

    margin-top:10px;

}



/* Admin Tag */

.admin-tag{

    text-align:center;
    margin:25px;
    color:#2563eb;
    font-weight:bold;

}



/* Container */

.container{

    width:85%;
    margin:30px auto;

}



/* Card */

.edit-card{

    background:white;
    padding:25px;
    border-radius:15px;
    margin-bottom:25px;
    box-shadow:0 5px 20px rgba(0,0,0,0.08);

}



.edit-card h2{

    color:#1e3a8a;
    margin-bottom:20px;

}



/* Form */

.form-group{

    margin-bottom:18px;

}


label{

    display:block;
    font-weight:bold;
    margin-bottom:8px;

}


input,textarea{

    width:100%;
    padding:12px;
    border:1px solid #cbd5e1;
    border-radius:8px;

}


textarea{

    height:120px;
    resize:none;

}



/* Buttons */

.buttons{

    margin-top:20px;

}


.save-btn{

    background:#14b8a6;
    color:white;
    border:none;
    padding:12px 25px;
    border-radius:10px;
    font-weight:bold;
    cursor:pointer;

}


.cancel-btn{

    background:#64748b;
    color:white;
    text-decoration:none;
    padding:12px 25px;
    border-radius:10px;
    margin-left:10px;

}



/* Footer */

footer{

    margin-top:50px;
    background:#2563eb;
    color:white;
    text-align:center;
    padding:15px;

}


@media(max-width:700px){

.container{

width:95%;

}

}

</style>


</head>


<body>



<section class="page-banner">

<h1>⚽ Edit Outdoor Registration</h1>

<p>
Modify outdoor sports registration form details
</p>

</section>



<div class="admin-tag">

EDIT OUTDOOR REGISTRATION PANEL

</div>




<div class="container">



<!-- FORM FIELD EDIT -->


<div class="edit-card">


<h2>📝 Registration Form Fields</h2>



<div class="form-group">

<label>Full Name Field</label>

<input type="text" value="Full Name">

</div>




<div class="form-group">

<label>Roll Number / PRN Field</label>

<input type="text" value="Roll Number / PRN">

</div>




<div class="form-group">

<label>Department Field</label>

<input type="text" value="Department">

</div>




<div class="form-group">

<label>Year Field</label>

<input type="text" value="Year">

</div>




<div class="form-group">

<label>Mobile Number Field</label>

<input type="text" value="Mobile Number">

</div>




<div class="form-group">

<label>Email ID Field</label>

<input type="text" value="Email ID">

</div>




<div class="form-group">

<label>Sport Selection Field</label>

<input type="text" value="Sport">

</div>



</div>






<!-- INSTRUCTIONS EDIT -->


<div class="edit-card">


<h2>📌 Registration Instructions</h2>


<div class="form-group">


<textarea>

Register for outdoor sports tournaments and represent your department in inter-college competitions.

</textarea>


</div>



<div class="buttons">


<button class="save-btn">

Save Changes

</button>



<a href="admin-outdoor-registration.html" class="cancel-btn">

Cancel

</a>


</div>



</div>





</div>





<footer>

© 2026 College Gymkhana Sports Department.

</footer>



</body>

</html>
