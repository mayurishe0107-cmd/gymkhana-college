<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Admin Outdoor Coordinators</title>


<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}


body{
    background:#f8fafc;
    color:#1e3a8a;
}


/* Banner */

.page-banner{

    background:linear-gradient(135deg,#2563eb,#0ea5e9);
    color:white;
    text-align:center;
    padding:45px 20px;

}


.page-banner h1{
    font-size:40px;
}


.page-banner p{
    margin-top:10px;
}


/* Admin Tag */

.admin-tag{

    text-align:center;
    margin:25px;
    color:#2563eb;
    font-weight:bold;

}


/* Container */

.container{

    width:85%;
    margin:30px auto;

}


/* Coordinator Card */

.coordinator-card{

    background:white;
    padding:25px;
    border-radius:15px;
    margin-bottom:25px;
    box-shadow:0 5px 20px rgba(0,0,0,0.08);

}


.coordinator-card h2{

    color:#1e3a8a;
    margin-bottom:15px;

}



label{

    font-weight:bold;
    display:block;
    margin-top:12px;

}



input{

    width:100%;
    padding:10px;
    margin-top:5px;
    border:1px solid #ddd;
    border-radius:8px;
    font-size:15px;

}



/* Buttons */

button{

    border:none;
    padding:10px 18px;
    border-radius:8px;
    color:white;
    cursor:pointer;
    font-weight:bold;
    margin-top:15px;

}


.delete{

    background:#dc3545;

}


.add{

    background:#14b8a6;

}


.save{

    background:#2563eb;

}


/* Footer */

footer{

    margin-top:50px;
    background:#2563eb;
    color:white;
    text-align:center;
    padding:15px;

}


</style>


</head>



<body>



<section class="page-banner">

<h1>👨‍🏫 Outdoor Coordinators Admin</h1>

<p>
Manage Faculty and Student Sports Coordinators
</p>

</section>



<div class="admin-tag">

OUTDOOR COORDINATORS ADMIN PANEL

</div>




<div class="container" id="coordinatorContainer">



<!-- Cricket -->

<div class="coordinator-card">

<label>Sport Name</label>
<input value="Cricket">


<label>Faculty Coordinator Name</label>
<input value="Prof. A. Sharma">


<label>Faculty Contact</label>
<input value="9876543210">


<label>Student Coordinator Name</label>
<input value="Rahul Patil">


<label>Student Contact</label>
<input value="9876501234">


<button class="delete" onclick="deleteCard(this)">
Delete Coordinator
</button>


</div>




<!-- Football -->

<div class="coordinator-card">

<label>Sport Name</label>
<input value="Football">


<label>Faculty Coordinator Name</label>
<input value="Prof. S. Joshi">


<label>Faculty Contact</label>
<input value="9876541111">


<label>Student Coordinator Name</label>
<input value="Akash More">


<label>Student Contact</label>
<input value="9876502222">


<button class="delete" onclick="deleteCard(this)">
Delete Coordinator
</button>


</div>




<!-- Volleyball -->

<div class="coordinator-card">

<label>Sport Name</label>
<input value="Volleyball">


<label>Faculty Coordinator Name</label>
<input value="Prof. P. Deshmukh">


<label>Faculty Contact</label>
<input value="9876543333">


<label>Student Coordinator Name</label>
<input value="Neha Patil">


<label>Student Contact</label>
<input value="9876504444">


<button class="delete" onclick="deleteCard(this)">
Delete Coordinator
</button>


</div>




<!-- Kabaddi -->

<div class="coordinator-card">

<label>Sport Name</label>
<input value="Kabaddi">


<label>Faculty Coordinator Name</label>
<input value="Prof. R. Jadhav">


<label>Faculty Contact</label>
<input value="9876545555">


<label>Student Coordinator Name</label>
<input value="Sagar Shinde">


<label>Student Contact</label>
<input value="9876506666">


<button class="delete" onclick="deleteCard(this)">
Delete Coordinator
</button>


</div>



</div>





<center>

<button class="add" onclick="addCoordinator()">
+ Add New Coordinator
</button>


<button class="save">
Save Changes
</button>

</center>





<footer>

© 2026 College Gymkhana Sports Department.

</footer>





<script>


function deleteCard(btn){

btn.parentElement.remove();

}




function addCoordinator(){


let container=document.getElementById("coordinatorContainer");


let card=document.createElement("div");


card.className="coordinator-card";


card.innerHTML=`

<label>Sport Name</label>
<input placeholder="Enter Sport Name">


<label>Faculty Coordinator Name</label>
<input placeholder="Enter Faculty Name">


<label>Faculty Contact</label>
<input placeholder="Enter Faculty Contact">


<label>Student Coordinator Name</label>
<input placeholder="Enter Student Name">


<label>Student Contact</label>
<input placeholder="Enter Student Contact">


<button class="delete" onclick="deleteCard(this)">
Delete Coordinator
</button>

`;


container.appendChild(card);


}


</script>



</body>
</html>
