<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Admin Outdoor Champions</title>


<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}


body{
    background:#f8fafc;
    color:#1e3a8a;
}


/* Banner */

.page-banner{

    background:linear-gradient(135deg,#2563eb,#0ea5e9);
    color:white;
    text-align:center;
    padding:45px 20px;

}


.page-banner h1{
    font-size:40px;
}


/* Admin tag */

.admin-tag{

    text-align:center;
    margin:25px;
    color:#2563eb;
    font-weight:bold;

}



/* Container */

.container{

    width:85%;
    margin:30px auto;

}



/* Champion Card */

.champion-card{

    background:white;
    padding:25px;
    border-radius:15px;
    margin-bottom:25px;
    box-shadow:0 5px 20px rgba(0,0,0,0.08);

}


input{

    width:100%;
    padding:10px;
    margin:8px 0;
    border:1px solid #ddd;
    border-radius:8px;
    font-size:15px;

}


label{

    font-weight:bold;
    color:#1e3a8a;

}


/* Buttons */


button{

    border:none;
    padding:10px 18px;
    border-radius:8px;
    color:white;
    cursor:pointer;
    font-weight:bold;
    margin:5px;

}


.delete{

    background:#dc3545;

}


.add{

    background:#14b8a6;

}


.save{

    background:#2563eb;

}



/* Footer */


footer{

    margin-top:50px;
    background:#2563eb;
    color:white;
    text-align:center;
    padding:15px;

}


</style>


</head>


<body>


<section class="page-banner">

<h1>🏆 Outdoor Champions Admin</h1>

<p>
Manage outdoor sports winners and achievements
</p>

</section>



<div class="admin-tag">

OUTDOOR CHAMPIONS ADMIN PANEL

</div>



<div class="container" id="championContainer">



<!-- Cricket -->

<div class="champion-card">

<h2>🏏 Sport Name</h2>

<label>Sport Name</label>
<input value="Cricket">


<label>Winner</label>
<input value="Computer Technology">


<label>1st Runner-Up</label>
<input value="Information Technology">


<label>2nd Runner-Up</label>
<input value="Mechanical Engineering">


<label>Year</label>
<input value="2026">


<button class="delete" onclick="deleteCard(this)">
Delete Sport
</button>


</div>





<!-- Football -->

<div class="champion-card">

<label>Sport Name</label>
<input value="Football">


<label>Winner</label>
<input value="Electrical Engineering">


<label>1st Runner-Up</label>
<input value="Civil Engineering">


<label>2nd Runner-Up</label>
<input value="Computer Technology">


<label>Year</label>
<input value="2026">


<button class="delete" onclick="deleteCard(this)">
Delete Sport
</button>


</div>





<!-- Kabaddi -->

<div class="champion-card">

<label>Sport Name</label>
<input value="Kabaddi">


<label>Winner</label>
<input value="Mechanical Engineering">


<label>1st Runner-Up</label>
<input value="Electrical Engineering">


<label>2nd Runner-Up</label>
<input value="Civil Engineering">


<label>Year</label>
<input value="2026">


<button class="delete" onclick="deleteCard(this)">
Delete Sport
</button>

</div>





<!-- Volleyball -->

<div class="champion-card">

<label>Sport Name</label>
<input value="Volleyball">


<label>Winner</label>
<input value="Information Technology">


<label>1st Runner-Up</label>
<input value="Computer Technology">


<label>2nd Runner-Up</label>
<input value="Electronics & Telecommunication">


<label>Year</label>
<input value="2026">


<button class="delete" onclick="deleteCard(this)">
Delete Sport
</button>

</div>



</div>



<center>

<button class="add" onclick="addSport()">
+ Add New Sport
</button>


<button class="save">
Save Changes
</button>

</center>




<footer>

© 2026 College Gymkhana Sports Department.

</footer>



<script>


function deleteCard(btn){

btn.parentElement.remove();

}



function addSport(){

let container=document.getElementById("championContainer");


let card=document.createElement("div");

card.className="champion-card";


card.innerHTML=`

<label>Sport Name</label>
<input placeholder="Enter Sport Name">


<label>Winner</label>
<input placeholder="Enter Winner">


<label>1st Runner-Up</label>
<input placeholder="Enter 1st Runner-Up">


<label>2nd Runner-Up</label>
<input placeholder="Enter 2nd Runner-Up">


<label>Year</label>
<input placeholder="Enter Year">


<button class="delete" onclick="deleteCard(this)">
Delete Sport
</button>

`;


container.appendChild(card);


}


</script>



</body>

</html>
