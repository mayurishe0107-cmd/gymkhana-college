<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Add Sports Gallery</title>


<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}


body{
background:#f8fafc;
color:#1e3a8a;
}


.page-banner{

background:linear-gradient(135deg,#2563eb,#0ea5e9);
color:white;
text-align:center;
padding:45px 20px;

}


.page-banner h1{

font-size:38px;

}


.page-banner p{

margin-top:10px;

}



.container{

width:50%;
margin:40px auto;
background:white;
padding:30px;
border-radius:15px;
box-shadow:0 5px 20px rgba(0,0,0,0.08);

}



label{

display:block;
font-weight:bold;
margin-top:15px;

}



input,textarea{

width:100%;
padding:12px;
margin-top:8px;
border:1px solid #cbd5e1;
border-radius:8px;

}


textarea{

height:100px;
resize:none;

}



.add-btn{

margin-top:25px;
width:100%;
padding:14px;
background:#14b8a6;
color:white;
border:none;
border-radius:10px;
font-size:16px;
font-weight:bold;
cursor:pointer;

}



.add-btn:hover{

background:#0f9488;

}



footer{

margin-top:50px;
background:#2563eb;
color:white;
text-align:center;
padding:15px;

}



@media(max-width:700px){

.container{

width:90%;

}

}


</style>


</head>



<body>



<section class="page-banner">

<h1>➕ Add New Sports Gallery</h1>

<p>
Add new sports event memories and images
</p>

</section>




<div class="container">


<form>


<label>
Gallery Title
</label>

<input type="text" placeholder="Example: Basketball Championship">



<label>
Image Path
</label>

<input type="text" placeholder="Example: images/basketball.jpg">



<label>
Description
</label>

<textarea placeholder="Enter gallery description"></textarea>



<button class="add-btn">

Add Gallery

</button>


</form>


</div>




<footer>

© 2026 College Gymkhana Sports Department.

</footer>



</body>
</html>
