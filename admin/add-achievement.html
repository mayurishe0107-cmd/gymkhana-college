<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Add Achievement</title>


<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}


body{

background:#f8fafc;
color:#1e3a8a;

}


.page-banner{

background:linear-gradient(135deg,#2563eb,#0ea5e9);
color:white;
text-align:center;
padding:45px 20px;

}


.page-banner h1{

font-size:38px;

}


.container{

width:50%;
margin:40px auto;
background:white;
padding:30px;
border-radius:15px;
box-shadow:0 5px 20px rgba(0,0,0,0.08);

}



label{

display:block;
font-weight:bold;
margin-top:15px;

}



input,textarea{

width:100%;
padding:12px;
margin-top:8px;
border:1px solid #cbd5e1;
border-radius:8px;

}


textarea{

height:100px;
resize:none;

}



.add-btn{

margin-top:25px;
width:100%;
padding:14px;
background:#14b8a6;
color:white;
border:none;
border-radius:10px;
font-weight:bold;
cursor:pointer;

}


footer{

margin-top:50px;
background:#2563eb;
color:white;
text-align:center;
padding:15px;

}

</style>

</head>


<body>


<section class="page-banner">

<h1>➕ Add New Achievement</h1>

<p>
Add new sports achievements and trophies
</p>

</section>




<div class="container">


<form>


<label>
Achievement Title
</label>

<input type="text" placeholder="Example: Inter College Football Championship">



<label>
Team / Player Name
</label>

<input type="text" placeholder="Enter Team or Player Name">



<label>
Sport Name
</label>

<input type="text" placeholder="Example: Cricket">



<label>
Description
</label>

<textarea placeholder="Enter achievement details"></textarea>



<label>
Achievement Level
</label>

<input type="text" placeholder="Example: State Level - 2026">



<button class="add-btn">

Add Achievement

</button>



</form>


</div>




<footer>

© 2026 College Gymkhana Sports Department.

</footer>



</body>
</html>
