<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Manage Schedule</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#f5f7fb;
padding:30px;
}

.container{
max-width:1100px;
margin:auto;
}

.page-header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:25px;
}

.page-title{
font-size:30px;
font-weight:700;
}

.back-btn{
background:#3b82f6;
color:white;
padding:10px 18px;
border-radius:10px;
text-decoration:none;
font-weight:600;
}

.form-card{
background:white;
padding:25px;
border-radius:18px;
box-shadow:0 2px 10px rgba(0,0,0,.08);
margin-bottom:30px;
}

.form-card h2{
margin-bottom:20px;
}

.form-group{
margin-bottom:15px;
}

label{
display:block;
font-weight:600;
margin-bottom:8px;
}

input,
select{
width:100%;
padding:12px;
border:1px solid #ddd;
border-radius:10px;
}

.publish-btn{
background:linear-gradient(90deg,#7b5cff,#3b82f6);
color:white;
border:none;
padding:12px 20px;
border-radius:10px;
font-weight:600;
cursor:pointer;
}

.section-title{
font-size:24px;
font-weight:700;
margin-bottom:20px;
}

.schedule-card{
background:white;
padding:20px;
border-radius:18px;
box-shadow:0 2px 10px rgba(0,0,0,.08);
margin-bottom:15px;
}

.day-tag{
display:inline-block;
background:#eef2ff;
color:#3b82f6;
padding:5px 12px;
border-radius:20px;
font-size:12px;
font-weight:600;
margin-bottom:10px;
}

.schedule-card h3{
margin-bottom:8px;
}

.schedule-card p{
color:#666;
margin-bottom:6px;
}

.actions{
display:flex;
gap:10px;
margin-top:15px;
}

.edit-btn{
background:#3b82f6;
color:white;
border:none;
padding:10px 16px;
border-radius:10px;
cursor:pointer;
}

.delete-btn{
background:#ef4444;
color:white;
border:none;
padding:10px 16px;
border-radius:10px;
cursor:pointer;
}

</style>
</head>
<body>

<div class="container">

<div class="page-header">
<h1 class="page-title">Schedule Management</h1>

<a href="eventschedule-admin.html" class="back-btn">
← Back
</a>
</div>

<!-- ADD EVENT -->

<div class="form-card">

<h2>Add New Event</h2>

<div class="form-group">
<label>Day</label>
<select>
<option>Day 1</option>
<option>Day 2</option>
<option>Day 3</option>
</select>
</div>

<div class="form-group">
<label>Event Name</label>
<input type="text" placeholder="Enter event name">
</div>

<div class="form-group">
<label>Venue</label>
<input type="text" placeholder="Enter venue">
</div>

<div class="form-group">
<label>Time</label>
<input type="time">
</div>

<button class="publish-btn">
Add Schedule
</button>

</div>

<!-- EXISTING EVENTS -->

<h2 class="section-title">
Existing Schedule
</h2>

<div class="schedule-card">

<span class="day-tag">Day 1</span>

<h3>Anchoring Auditions</h3>

<p>📍 Seminar Hall 2</p>

<p>🕔 05:00 PM</p>

<div class="actions">
<button class="edit-btn">Edit</button>
<button class="delete-btn">Delete</button>
</div>

</div>

<div class="schedule-card">

<span class="day-tag">Day 2</span>

<h3>Solo Singing</h3>

<p>📍 Main Auditorium</p>

<p>🕙 10:00 AM</p>

<div class="actions">
<button class="edit-btn">Edit</button>
<button class="delete-btn">Delete</button>
</div>

</div>

<div class="schedule-card">

<span class="day-tag">Day 3</span>

<h3>Group Dance</h3>

<p>📍 Open Air Theatre</p>

<p>🕞 03:30 PM</p>

<div class="actions">
<button class="edit-btn">Edit</button>
<button class="delete-btn">Delete</button>
</div>

</div>

</div>

</body>
</html>
