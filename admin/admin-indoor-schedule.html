<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Admin Indoor Schedule</title>


<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}


body{
background:#f8fafc;
color:#1e3a8a;
}



/* Banner */

.page-banner{

background:linear-gradient(135deg,#2563eb,#0ea5e9);
color:white;
text-align:center;
padding:45px 20px;

}


.page-banner h1{

font-size:40px;

}


.page-banner p{

margin-top:10px;

}



/* Admin Tag */

.admin-tag{

text-align:center;
margin:25px;
color:#2563eb;
font-weight:bold;

}



/* Container */

.container{

width:85%;
margin:30px auto;

}



/* Schedule Card */

.schedule-card{

background:white;
padding:25px;
border-radius:15px;
margin-bottom:25px;
box-shadow:0 5px 20px rgba(0,0,0,0.08);

}



label{

display:block;
font-weight:bold;
margin-top:12px;

}



input{

width:100%;
padding:10px;
margin-top:5px;
border:1px solid #cbd5e1;
border-radius:8px;

}



/* Buttons */

button{

border:none;
padding:10px 18px;
border-radius:8px;
color:white;
cursor:pointer;
font-weight:bold;
margin-top:18px;

}


.delete{

background:#ef4444;

}


.add{

background:#14b8a6;

}


.save{

background:#2563eb;

}



/* Footer */

footer{

margin-top:50px;
background:#2563eb;
color:white;
text-align:center;
padding:15px;

}


</style>

</head>


<body>



<section class="page-banner">

<h1>📅 Indoor Schedule Admin</h1>

<p>
Manage indoor sports match schedules
</p>

</section>




<div class="admin-tag">

INDOOR SCHEDULE ADMIN PANEL

</div>





<div class="container" id="scheduleContainer">



<!-- Chess -->


<div class="schedule-card">


<label>Sport Name</label>

<input value="♟ Chess">



<label>Date</label>

<input value="15 July 2025">



<label>Time</label>

<input value="10:00 AM">



<label>Venue</label>

<input value="Indoor Hall">



<button class="delete" onclick="deleteCard(this)">
Delete Schedule
</button>


</div>






<!-- Carrom -->


<div class="schedule-card">


<label>Sport Name</label>

<input value="🎯 Carrom">



<label>Date</label>

<input value="17 July 2025">



<label>Time</label>

<input value="11:30 AM">



<label>Venue</label>

<input value="Gymkhana Hall">



<button class="delete" onclick="deleteCard(this)">
Delete Schedule
</button>


</div>







<!-- Table Tennis -->


<div class="schedule-card">


<label>Sport Name</label>

<input value="🏓 Table Tennis">



<label>Date</label>

<input value="19 July 2025">



<label>Time</label>

<input value="2:00 PM">



<label>Venue</label>

<input value="Sports Room">



<button class="delete" onclick="deleteCard(this)">
Delete Schedule
</button>


</div>




</div>






<center>


<button class="add" onclick="addSchedule()">

+ Add New Schedule

</button>



<button class="save">

Save Changes

</button>


</center>







<footer>

© 2026 College Gymkhana Sports Department.

</footer>





<script>


function deleteCard(btn){

btn.parentElement.remove();

}




function addSchedule(){


let container=document.getElementById("scheduleContainer");


let card=document.createElement("div");


card.className="schedule-card";


card.innerHTML=`

<label>Sport Name</label>
<input placeholder="Enter Sport Name">


<label>Date</label>
<input placeholder="Enter Date">


<label>Time</label>
<input placeholder="Enter Time">


<label>Venue</label>
<input placeholder="Enter Venue">


<button class="delete" onclick="deleteCard(this)">
Delete Schedule
</button>


`;


container.appendChild(card);


}


</script>



</body>

</html>
