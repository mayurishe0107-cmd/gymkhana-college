<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Edit Achievement</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f8fafc;
color:#1e3a8a;
}

.page-banner{
background:linear-gradient(135deg,#2563eb,#0ea5e9);
color:white;
text-align:center;
padding:45px 20px;
}

.page-banner h1{
font-size:40px;
}

.container{
width:50%;
margin:40px auto;
background:white;
padding:30px;
border-radius:15px;
box-shadow:0 5px 20px rgba(0,0,0,0.08);
}

label{
font-weight:bold;
display:block;
margin-top:15px;
}

input,textarea{

width:100%;
padding:12px;
margin-top:8px;
border:1px solid #cbd5e1;
border-radius:8px;

}

textarea{
height:100px;
resize:none;
}


.save-btn{

margin-top:25px;
width:100%;
padding:14px;
background:#2563eb;
color:white;
border:none;
border-radius:10px;
font-weight:bold;
cursor:pointer;

}


footer{

margin-top:50px;
background:#2563eb;
color:white;
text-align:center;
padding:15px;

}

</style>

</head>


<body>


<section class="page-banner">

<h1>🏆 Edit Sports Achievement</h1>

<p>Update achievement details</p>

</section>



<div class="container">


<form>


<label>Achievement Title</label>
<input type="text" id="title">



<label>Team / Player Name</label>
<input type="text" id="team">



<label>Sport Name</label>
<input type="text" id="sport">



<label>Description</label>
<textarea id="description"></textarea>



<label>Achievement Level</label>
<input type="text" id="level">



<button class="save-btn">
Save Changes
</button>


</form>


</div>



<footer>

© 2026 College Gymkhana Sports Department.

</footer>




<script>

let params = new URLSearchParams(window.location.search);

let id = params.get("id");


// Cricket

if(id=="1"){

document.getElementById("title").value="Intercollege Cricket Championship";

document.getElementById("team").value="College Cricket Team";

document.getElementById("sport").value="Cricket";

document.getElementById("description").value=
"Won the Intercollege Cricket Championship and remained undefeated throughout the tournament.";

document.getElementById("level").value="State Level - 2025";

}



// Football

else if(id=="2"){

document.getElementById("title").value="Football Runner-Up";

document.getElementById("team").value="College Football Team";

document.getElementById("sport").value="Football";

document.getElementById("description").value=
"Achieved runner-up position in the District Football Competition after an excellent performance.";

document.getElementById("level").value="District Level - 2025";

}



// Badminton

else if(id=="3"){

document.getElementById("title").value="Badminton Gold Medal";

document.getElementById("team").value="Rahul Sharma";

document.getElementById("sport").value="Badminton";

document.getElementById("description").value=
"Secured first place in the University Badminton Championship with outstanding gameplay.";

document.getElementById("level").value="University Level - 2025";

}


</script>


</body>
</html>
