<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login</title>
  <link rel="stylesheet" href="style.css">
</head>

<body class="login-body">

<div class="login-box">

  <h1>Welcome Back</h1>

  <form>

    <label>Login Role</label>

    <select>
      <option>Student</option>
      <option>Admin</option>
    </select>

    <label>Roll Number</label>

    <input
      type="text"
      maxlength="6"
      pattern="[0-9]{6}"
      placeholder="Maximum 6 digits"
      required
    >

    <label>Student Email ID</label>

    <input
      type="email"
      placeholder="student@gmail.com"
      required
    >

    <label>Password</label>

    <input
      type="password"
      placeholder="********"
      required
    >

    <button type="submit">
      ACCESS PORTAL →
    </button>

  </form>

</div>

</body>
</html>
